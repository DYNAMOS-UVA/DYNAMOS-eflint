# etcd-pvc holds orchestrator config JSON and eFLINT models for /app/etcd on the orchestrator
# and the policy-enforcer eflint-models subpath. Seed it with configuration/fill-rabbit-pvc.sh
# (invoked from configuration/dynamos-configuration.sh after this chart is applied).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etcd-pvc
  namespace: orchestrator
  annotations:
    "linkerd.io/inject" : disabled
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Mi
